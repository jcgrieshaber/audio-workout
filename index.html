<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Speed Reloaded — Audio Coach</title>
<style>
  :root{
    --bg:#0b0c0e;
    --surface:#17191d;
    --surface-2:#202329;
    --line:#2a2d34;
    --accent:#f5d51b;
    --accent-dim:#3a3410;
    --text:#f2f1ec;
    --text-muted:#8b8d93;
    --success:#34d399;
    --success-dim:#123328;
    --danger:#e5484d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  .head{margin-bottom:18px;}
  .word{font-weight:900;font-size:20px;letter-spacing:0.5px;text-transform:uppercase;line-height:1;}
  .word .sub{display:block;font-size:11px;letter-spacing:3px;color:var(--accent);margin-top:4px;font-weight:800;}
  .track-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;margin-top:18px;}
  .track{position:relative;height:6px;background:var(--surface-2);border-radius:3px;margin-bottom:18px;}
  .track-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}

  .mic-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 12px;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;font-size:12px;color:var(--text-muted);}
  .mic-dot{width:9px;height:9px;border-radius:50%;background:var(--text-muted);flex:0 0 auto;}
  .mic-dot.live{background:var(--danger);box-shadow:0 0 0 0 rgba(229,72,77,.6);animation:pulse 1.4s infinite;}
  .mic-dot.off{background:var(--text-muted);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(229,72,77,.5);}70%{box-shadow:0 0 0 8px rgba(229,72,77,0);}100%{box-shadow:0 0 0 0 rgba(229,72,77,0);}}
  .mic-row button{margin-left:auto;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    font-size:11px;padding:6px 10px;border-radius:20px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}

  .stage{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-bottom:16px;}
  .stage-eyebrow{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-weight:800;}
  .stage-name{font-size:24px;font-weight:900;margin:6px 0 2px;line-height:1.15;}
  .stage-presc{font-size:13px;color:var(--text-muted);}
  .stage-setcount{margin-top:14px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
  .stage-setcount b{color:var(--accent);font-size:15px;}

  .timer-display{font-size:56px;font-weight:900;margin:16px 0 4px;font-variant-numeric:tabular-nums;text-align:center;
    display:none;}
  .timer-display.show{display:block;}
